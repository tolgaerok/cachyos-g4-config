	menuentry 'CachyOS Linux, with Linux linux-cachyos-lts' --class cachyos --class gnu-linux --class gnu --class os $menuentry_id_option 'gnulinux-linux-cachyos-lts-advanced-d8e6149a-139e-476f-b6e2-91798312fff5' {
