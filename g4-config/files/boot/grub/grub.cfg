	load_video
	set gfxpayload=keep
	insmod gzio
	insmod part_gpt
	insmod btrfs
	search --no-floppy --fs-uuid --set=root d8e6149a-139e-476f-b6e2-91798312fff5
	echo	'Loading Linux linux-cachyos ...'
	linux	/@/boot/vmlinuz-linux-cachyos root=UUID=d8e6149a-139e-476f-b6e2-91798312fff5 rw rootflags=subvol=@  nowatchdog nvme_load=YES zswap.enabled=0 splash loglevel=3 mitigations=off
