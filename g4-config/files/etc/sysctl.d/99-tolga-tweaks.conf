# ─────────────────────────────────────────────
#  Tolga Erok — sysctl tweaks
#  /etc/sysctl.d/99-tolga-tweaks.conf
# ─────────────────────────────────────────────

# TCP congestion — switch cubic → bbr
net.ipv4.tcp_congestion_control = bbr

# TCP write buffer — match read buffer max (was 4MB, now 33MB)
net.ipv4.tcp_wmem            = 4096 16384 33554432
net.core.wmem_max            = 33554432

# TCP Fast Open — client + server (was client-only)
net.ipv4.tcp_fastopen        = 3

# TIME_WAIT assassination protection
net.ipv4.tcp_rfc1337         = 1

# MTU probing — on-demand only (detect black holes)
net.ipv4.tcp_mtu_probing     = 1

vm.swappiness = 150
